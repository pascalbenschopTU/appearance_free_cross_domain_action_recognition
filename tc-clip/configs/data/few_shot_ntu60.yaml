#@package _global_
data:
  train:
    dataset_name: ntu60_few_shot_train_{shot}_shot
    root: ${ntu60.root}
    num_classes: ${ntu60.num_classes.default}
    label_file: ${ntu60.label_files.default}
    ann_file: ${ntu60.ann_files.few_shot_train_xsub}
  val:
    dataset_name: rwf2000_all
    root: ${rwf2000.root}
    num_classes: ${rwf2000.num_classes.default}
    label_file: ${rwf2000.label_files.default}
    ann_file: ${rwf2000.ann_files.all}
    grouped_text_file: ${rwf2000.label_files.ntu_grouped_text}
    eval_group_reduce: max
