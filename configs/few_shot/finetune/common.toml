# Shared few-shot finetune defaults.
# Dataset-specific configs provide roots, labels, and pretrained checkpoints.

[data]
train_modality = "motion"
val_modality = "motion"
motion_data_source = "zstd"
text_bank_backend = "clip"
val_subset_size = 0
val_samples_per_class = 5
val_subset_seed = 0

[motion]
img_size = 224
mhi_frames = 32
flow_frames = 128
flow_hw = 112
mhi_windows = "25"
diff_threshold = 15.0
flow_max_disp = 20.0
flow_backend = "farneback"
fb_pyr_scale = 0.5
fb_levels = 3
fb_winsize = 15
fb_iterations = 3
fb_poly_n = 5
fb_poly_sigma = 1.2
fb_flags = 0
motion_img_resize = 256
motion_flow_resize = 128
motion_resize_mode = "short_side"
motion_train_crop_mode = "random"
motion_eval_crop_mode = "center"

[finetune]
freeze_backbone = true
freeze_bn_stats = true
batch_size = 16
epochs = 50
lr = 2e-4
weight_decay = 0.001
warmup_steps = 100
min_lr = 2e-6
p_affine = 0.25
p_hflip = 0.5
mixup_prob = 0.25
mixup_alpha = 0.2
label_smoothing = 0.05
lambda_rep_mix = 0.1
rep_mix_alpha = 0.4
rep_mix_semantic = true
rep_mix_semantic_topk = 3
# unfreeze_modules = "mixed_5b,mixed_5c"

[runtime]
num_workers = 16
log_every = 100
save_every = 200
val_skip_epochs = 0
val_every = 5
seed = 0
device = "cuda"
checkpoint_mode = "latest"
