# Partial finetune config. CLI flags still override these values.

[data]
root_dir = "/path/to/finetune_root"
manifest = ""
train_modality = "motion"
val_modality = "motion"
motion_data_source = "zstd"
text_bank_backend = "clip"

[pretrained]
pretrained_ckpt = "/path/to/checkpoint.pt"

[motion]
img_size = 224
mhi_frames = 32
flow_frames = 128
flow_hw = 112
mhi_windows = "15"
diff_threshold = 15.0
motion_img_resize = 256
motion_flow_resize = 128
motion_resize_mode = "short_side"
motion_train_crop_mode = "random"
motion_eval_crop_mode = "center"

[model]
model = "i3d"
embed_dim = 512
fuse = "avg_then_proj"
dropout = 0.0
active_branch = "both"

[finetune]
freeze_backbone = true
freeze_bn_stats = true
batch_size = 16
epochs = 50
lr = 0.0002
weight_decay = 0.0001
warmup_steps = 1000
min_lr = 0.000001

[runtime]
num_workers = 16
out_dir = "out/finetune"
tb_dir = "runs"
ckpt_dir = "checkpoints"
eval_dir = "eval_out"
device = "cuda"
