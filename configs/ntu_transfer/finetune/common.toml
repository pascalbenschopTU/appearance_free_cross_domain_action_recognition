# Shared NTU transfer finetune defaults.

[data]
train_modality = "motion"
val_modality = "motion"
motion_data_source = "zstd"
text_bank_backend = "clip"
val_subset_size = 0
val_samples_per_class = 0
val_subset_seed = 0

[motion]
motion_img_resize = 256
motion_flow_resize = 128
motion_resize_mode = "short_side"
motion_train_crop_mode = "center"
motion_eval_crop_mode = "center"

[finetune]
freeze_backbone = false
freeze_bn_stats = false
batch_size = 16
epochs = 10
lr = 0.0002
weight_decay = 0.0001
warmup_steps = 100
min_lr = 0.000001
mixup_prob = 0.25
mixup_alpha = 0.2
temporal_mixup_prob = 0.25
label_smoothing = 0.05
lambda_rep_mix = 0.1
rep_mix_alpha = 0.4
rep_mix_semantic = true
rep_mix_semantic_topk = 3

[runtime]
num_workers = 16
log_every = 100
save_every = 200
val_skip_epochs = 0
val_every = 1
seed = 0
device = "cuda"
