# Shared evaluation defaults for the two-class skin-tone shortcut probe.

[data]
root_dir = "../../datasets/skin_tone_actions/camera_far"
input_modality = "motion"

[motion]
img_size = 224
mhi_frames = 32
flow_frames = 128
flow_hw = 112
mhi_windows = "25"
diff_threshold = 15.0
flow_max_disp = 20.0
flow_backend = "farneback"
motion_img_resize = 256
motion_flow_resize = 128
motion_resize_mode = "short_side"
motion_eval_crop_mode = "center"

[text]
text_bank_backend = "clip"
no_clip = true
use_heads = "fuse"
head_weights = "1.0"
rgb_frames = 1
rgb_sampling = "center"
rgb_weight = 0.5

[runtime]
batch_size = 8
num_workers = 4
device = "cuda"
out_dir = "eval_out/skin_tone_probe"
